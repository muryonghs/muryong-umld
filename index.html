<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양심우산 학생 서비스</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 400px; margin: 0 auto; padding: 20px; text-align: center; }
        .tab-container { display: flex; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; background: #eee; border-radius: 5px; margin: 0 5px; font-weight: bold; }
        .tab.active { background: #4CAF50; color: white; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 10px; box-sizing: border-box; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* 외부 API로 불러온 QR 이미지를 예쁘게 담을 곳 */
        #qr-container { margin-top: 20px; display: flex; justify-content: center; }
        #qr-image { display: none; width: 200px; height: 200px; border: 1px solid #ddd; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>☂️ 양심우산 대여/반납</h2>
    
    <div class="tab-container">
        <div class="tab active" onclick="setMode('rent')">대여하기</div>
        <div class="tab" onclick="setMode('return')">반납하기</div>
    </div>

    <div id="form-container">
        <div class="form-group">
            <label>학번</label>
            <input type="text" id="student_id" placeholder="예: 20230101">
        </div>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="student_name" placeholder="예: 홍길동">
        </div>
        <div class="form-group" id="phone-group">
            <label>전화번호</label>
            <input type="text" id="phone_number" placeholder="예: 010-1234-5678">
        </div>
        <button onclick="generateQR()">QR 코드 생성</button>
    </div>

    <div id="qr-container">
        <img id="qr-image" src="" alt="학생 QR 코드">
    </div>

    <script>
        let currentMode = 'rent';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('phone-group').style.display = (mode === 'rent') ? 'block' : 'none';
            document.getElementById('qr-image').style.display = 'none'; // 모드 바뀌면 QR 숨기기
        }

        function generateQR() {
            const sid = document.getElementById('student_id').value;
            const sname = document.getElementById('student_name').value;
            const phone = document.getElementById('phone_number').value;

            if(!sid || !sname || (currentMode === 'rent' && !phone)) {
                alert("모든 정보를 입력해주세요.");
                return;
            }

            // 학생 정보를 하나의 JSON 데이터로 묶기
            const qrData = { action: currentMode, student_id: sid, student_name: sname, phone_number: phone };
            
            // 💡 무룡고 방식 적용: 데이터를 암호화(인코딩)해서 외부 API 주소 뒤에 붙여버리기
            const encodedData = encodeURIComponent(JSON.stringify(qrData));
            const qrImg = document.getElementById('qr-image');
            
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodedData}`;
            qrImg.style.display = 'block'; // 이미지 보이기
        }
    </script>
</body>
</html>
