<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양심우산 대여/반납 (학생용)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 p-6 flex justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-6 text-blue-600">☂️ 학교 양심우산</h1>
        
        <div class="flex gap-2 mb-6">
            <button onclick="setMode('rent')" id="btnRent" class="flex-1 py-2 bg-blue-500 text-white rounded font-bold">대여하기</button>
            <button onclick="setMode('return')" id="btnReturn" class="flex-1 py-2 bg-gray-200 text-gray-700 rounded font-bold">반납하기</button>
        </div>

        <div id="formSection" class="text-left">
            <input type="text" id="studentId" placeholder="학번 (예: 10101)" class="w-full mb-3 p-2 border rounded">
            <input type="text" id="studentName" placeholder="이름" class="w-full mb-3 p-2 border rounded">
            <input type="text" id="phone" placeholder="전화번호 (대여시에만 필요)" class="w-full mb-4 p-2 border rounded">
            
            <button onclick="generateQR()" class="w-full bg-green-500 text-white py-2 rounded font-bold">QR코드 생성</button>
        </div>

        <div id="qrSection" class="mt-6 hidden flex flex-col items-center">
            <p class="mb-2 font-bold text-gray-700" id="qrMessage">관리자에게 QR을 보여주세요</p>
            <div id="qrcode" class="p-4 bg-white border-2 border-dashed border-gray-300 rounded"></div>
        </div>
    </div>

    <script>
        let mode = 'rent';

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btnRent').className = mode === 'rent' ? "flex-1 py-2 bg-blue-500 text-white rounded font-bold" : "flex-1 py-2 bg-gray-200 text-gray-700 rounded font-bold";
            document.getElementById('btnReturn').className = mode === 'return' ? "flex-1 py-2 bg-blue-500 text-white rounded font-bold" : "flex-1 py-2 bg-gray-200 text-gray-700 rounded font-bold";
            
            document.getElementById('phone').style.display = mode === 'rent' ? "block" : "none";
            document.getElementById('qrSection').classList.add('hidden');
        }

        function generateQR() {
            const studentId = document.getElementById('studentId').value;
            const name = document.getElementById('studentName').value;
            const phone = document.getElementById('phone').value;

            if (!studentId || !name || (mode === 'rent' && !phone)) {
                alert('모든 정보를 입력해주세요!');
                return;
            }

            const qrData = JSON.stringify({
                type: mode,
                studentId: studentId,
                name: name,
                phone: mode === 'rent' ? phone : null
            });

            // 숨김 해제 후 QR 생성 (정상 작동 로직 유지)
            document.getElementById('qrSection').classList.remove('hidden');
            document.getElementById('qrcode').innerHTML = "";
            
            setTimeout(() => {
                new QRCode(document.getElementById("qrcode"), {
                    text: qrData,
                    width: 200,
                    height: 200,
                });
            }, 50);
        }
    </script>
</body>
</html>
