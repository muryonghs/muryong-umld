<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양심우산 학생 서비스</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 400px; margin: 0 auto; padding: 20px; text-align: center; }
        .tab-container { display: flex; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; background: #eee; border-radius: 5px; margin: 0 5px; }
        .tab.active { background: #4CAF50; color: white; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 10px; box-sizing: border-box; margin-top: 5px; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        #qr-container { margin-top: 20px; display: flex; justify-content: center; min-height: 200px; }
    </style>
</head>
<body>
    <h2>양심우산 대여/반납</h2>
    
    <div class="tab-container">
        <div class="tab active" onclick="setMode('rent')">대여하기</div>
        <div class="tab" onclick="setMode('return')">반납하기</div>
    </div>

    <div id="form-container">
        <div class="form-group">
            <label>학번</label>
            <input type="text" id="student_id" placeholder="예: 20230101">
        </div>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="student_name" placeholder="예: 홍길동">
        </div>
        <div class="form-group" id="phone-group">
            <label>전화번호</label>
            <input type="text" id="phone_number" placeholder="예: 010-1234-5678">
        </div>
        <button onclick="generateQR()">QR 코드 생성</button>
    </div>

    <div id="qr-container">
        <canvas id="qrcode"></canvas>
    </div>

    <script>
        let currentMode = 'rent';
        let qrCodeInstance = null; // QR 객체를 저장할 변수

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // 반납일 때는 전화번호 입력창 숨기기
            document.getElementById('phone-group').style.display = (mode === 'rent') ? 'block' : 'none';
            
            // 모드가 바뀌면 기존 QR 지우기
            if (qrCodeInstance) {
                qrCodeInstance.value = ''; 
            }
        }

        function generateQR() {
            const sid = document.getElementById('student_id').value;
            const sname = document.getElementById('student_name').value;
            const phone = document.getElementById('phone_number').value;

            if(!sid || !sname || (currentMode === 'rent' && !phone)) {
                alert("모든 정보를 입력해주세요.");
                return;
            }

            // QR에 담을 JSON 데이터
            const qrData = {
                action: currentMode,
                student_id: sid,
                student_name: sname,
                phone_number: phone
            };

            // QRious 라이브러리를 사용하여 QR 생성
            qrCodeInstance = new QRious({
                element: document.getElementById('qrcode'),
                value: JSON.stringify(qrData), // 데이터를 문자열로 변환
                size: 200,
                level: 'L' // 오류 복원 수준 (L: 용량 최대로)
            });
            
            alert("QR 코드가 생성되었습니다. 관리자에게 보여주세요.");
        }
    </script>
</body>
</html>
