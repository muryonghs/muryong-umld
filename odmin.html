<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 양심우산 대여현황</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto 20px auto; border: 2px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #4CAF50; color: white; }
        button { padding: 10px; background: #333; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>관리자 스캐너 & 대여 현황</h2>

    <div id="reader"></div>

    <h3>현재 대여 현황 <button onclick="fetchRentals()" style="font-size: 12px; float: right;">새로고침</button></h3>
    <table>
        <thead>
            <tr>
                <th>상태</th>
                <th>학번</th>
                <th>이름</th>
                <th>우산번호</th>
                <th>대여일시</th>
            </tr>
        </thead>
        <tbody id="rental-list">
            </tbody>
    </table>

    <script>
        // Supabase 초기화 (제공해주신 키 사용)
        const supabaseUrl = 'https://urzbonndueqylygtzlus.supabase.co';
        const supabaseKey = 'sb_publishable_rZYklPBEFvoKZxatf_xAig_ceWd_epI';
        const supabase = supabaseCreateClient.createClient(supabaseUrl, supabaseKey);

        // 스캐너 상태 (중복 스캔 방지용)
        let isProcessing = false;

        async function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return;
            isProcessing = true;
            
            try {
                const data = JSON.parse(decodedText);
                
                if (data.action === 'rent') {
                    // 대여 처리
                    const umbrellaNum = prompt(`${data.student_name} 학생에게 빌려줄 우산 번호를 입력하세요:`);
                    if (umbrellaNum) {
                        const { error } = await supabase.from('umbrella_rentals').insert([
                            { 
                                student_id: data.student_id, 
                                student_name: data.student_name, 
                                phone_number: data.phone_number,
                                umbrella_number: umbrellaNum,
                                status: '대여중'
                            }
                        ]);
                        if (error) throw error;
                        alert('대여 완료되었습니다!');
                    }
                } else if (data.action === 'return') {
                    // 반납 처리
                    const { error } = await supabase.from('umbrella_rentals')
                        .update({ status: '반납완료', return_date: new Date().toISOString() })
                        .eq('student_id', data.student_id)
                        .eq('status', '대여중');
                    
                    if (error) throw error;
                    alert(`${data.student_name} 학생의 우산이 반납 완료되었습니다!`);
                }
            } catch (err) {
                console.error(err);
                alert('QR 코드 인식 오류 또는 DB 통신 에러가 발생했습니다.');
            } finally {
                // 처리가 끝나면 다시 스캔 가능하게 대기 (3초 후)
                fetchRentals();
                setTimeout(() => { isProcessing = false; }, 3000);
            }
        }

        // 현황 불러오기
        async function fetchRentals() {
            const { data, error } = await supabase
                .from('umbrella_rentals')
                .select('*')
                .order('rent_date', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            const tbody = document.getElementById('rental-list');
            tbody.innerHTML = '';
            
            data.forEach(row => {
                const tr = document.createElement('tr');
                const date = new Date(row.rent_date).toLocaleString('ko-KR');
                tr.innerHTML = `
                    <td><strong style="color: ${row.status === '대여중' ? 'red' : 'green'}">${row.status}</strong></td>
                    <td>${row.student_id}</td>
                    <td>${row.student_name}</td>
                    <td>${row.umbrella_number}</td>
                    <td>${date}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 스캐너 실행
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: {width: 250, height: 250} }, /* verbose= */ false);
        html5QrcodeScanner.render(onScanSuccess);

        // 페이지 로드 시 현황 바로 불러오기
        fetchRentals();
    </script>
</body>
</html>
