<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 양심우산 대여현황</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 800px; margin: 0 auto; padding: 15px; }
        /* 스캐너가 예쁘게 들어갈 박스 */
        #reader { width: 100%; max-width: 500px; margin: 0 auto 20px auto; border: none !important; border-radius: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #333; color: white; }
        .refresh-btn { padding: 8px 12px; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; float: right; }
    </style>
</head>
<body>
    <h2>관리자 스캐너</h2>

    <div id="reader"></div>

    <h3>현재 대여 현황 <button class="refresh-btn" onclick="fetchRentals()">새로고침</button></h3>
    <table>
        <thead>
            <tr>
                <th>상태</th>
                <th>학번</th>
                <th>이름</th>
                <th>우산번호</th>
            </tr>
        </thead>
        <tbody id="rental-list"></tbody>
    </table>

    <script>
        // 🚨 이름 충돌 해결! (supabase -> myDb 로 변경)
        const supabaseUrl = 'https://urzbonndueqylygtzlus.supabase.co';
        const supabaseKey = 'sb_publishable_rZYklPBEFvoKZxatf_xAig_ceWd_epI';
        const myDb = supabase.createClient(supabaseUrl, supabaseKey); // 변경된 부분

        let isProcessing = false;

        // 자동 UI 스캐너 실행
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
        html5QrcodeScanner.render(onScanSuccess);

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                const data = JSON.parse(decodedText);
                
                if (data.action === 'rent') {
                    const umbrellaNum = prompt(`${data.student_name} 학생에게 빌려줄 우산 번호를 입력하세요:`);
                    if (umbrellaNum) {
                        // DB 통신 시 myDb 사용
                        const { error } = await myDb.from('umbrella_rentals').insert([
                            { student_id: data.student_id, student_name: data.student_name, phone_number: data.phone_number, umbrella_number: umbrellaNum, status: '대여중' }
                        ]);
                        if (error) throw error;
                        alert('✅ 대여 완료되었습니다!');
                    }
                } else if (data.action === 'return') {
                    const { error } = await myDb.from('umbrella_rentals')
                        .update({ status: '반납완료', return_date: new Date().toISOString() })
                        .eq('student_id', data.student_id)
                        .eq('status', '대여중');
                    
                    if (error) throw error;
                    alert(`✅ ${data.student_name} 학생의 우산이 반납 완료되었습니다!`);
                }
            } catch (err) {
                console.error(err);
                alert('QR 코드 인식 오류 또는 DB 에러가 발생했습니다.');
            } finally {
                fetchRentals();
                setTimeout(() => { isProcessing = false; }, 2000);
            }
        }

        async function fetchRentals() {
            // 현황 불러올 때도 myDb 사용
            const { data, error } = await myDb.from('umbrella_rentals').select('*').order('rent_date', { ascending: false }).limit(20);
            if (error) return console.error(error);

            const tbody = document.getElementById('rental-list');
            tbody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong style="color: ${row.status === '대여중' ? '#f44336' : '#4CAF50'}">${row.status}</strong></td>
                    <td>${row.student_id}</td>
                    <td>${row.student_name}</td>
                    <td>${row.umbrella_number || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 페이지 로드 시 현황 불러오기
        fetchRentals();
    </script>
</body>
</html>
