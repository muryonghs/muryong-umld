<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우산 대여 관리자 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 15px; background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        #admin-section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 20px auto; max-width: 1000px; }
        .header-actions { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        #qr-reader { width: 100%; border-radius: 10px; overflow: hidden; border: none !important; }
        .table th { background-color: #212529; color: white; }
    </style>
</head>
<body>

    <div id="admin-section">
        <h2 class="text-center fw-bold mb-4 text-primary">☂️ 양심우산 관리자 보드</h2>
        
        <div class="header-actions">
            <button class="btn btn-success btn-lg fw-bold shadow-sm" onclick="openScannerModal()">📷 우산 대여/반납 QR 스캔</button>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center">
                <thead>
                    <tr>
                        <th>학번</th>
                        <th>이름</th>
                        <th>우산번호</th>
                        <th>상태</th>
                        <th>대여 일시</th>
                    </tr>
                </thead>
                <tbody id="reserve-list">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="scannerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-success text-white">
              <h5 class="modal-title fw-bold">📷 학생 QR 패스 스캔</h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" onclick="stopScanner()"></button>
            </div>
            <div class="modal-body text-center p-0 bg-dark">
                <div id="qr-reader"></div>
            </div>
            <div class="modal-footer justify-content-center">
              <button type="button" class="btn btn-secondary w-50 fw-bold" data-bs-dismiss="modal" onclick="stopScanner()">카메라 끄기</button>
            </div>
          </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        // Supabase 설정
        const SUPABASE_URL = 'https://urzbonndueqylygtzlus.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_rZYklPBEFvoKZxatf_xAig_ceWd_epI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let scannerModal;
        let html5QrcodeScanner;

        // 1. 스캐너 모달창 열기
        function openScannerModal() {
            scannerModal = new bootstrap.Modal(document.getElementById('scannerModal'));
            scannerModal.show();
            
            // 모달창이 열리는 애니메이션 시간을 벌어준 뒤 카메라 켬
            setTimeout(() => {
                html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            }, 500);
        }

        // 2. 스캐너 끄기
        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
        }

        // 3. QR 스캔 성공 시 자동 처리 로직
        async function onScanSuccess(decodedText, decodedResult) {
            // 스캔이 완료되면 즉시 카메라를 끄고 모달창을 닫음
            stopScanner();
            scannerModal.hide();

            try {
                const data = JSON.parse(decodedText);

                if (data.type === 'rent') {
                    // --- 대여 처리 ---
                    let umbrellaNo = prompt(`☂️ [대여 신청]\n\n이름: ${data.name}\n학번: ${data.studentId}\n\n학생에게 지급할 우산 번호를 입력하세요:`);
                    
                    if (umbrellaNo) {
                        const { error } = await supabase.from('umbrella_rentals').insert([
                            { student_id: data.studentId, name: data.name, phone: data.phone, umbrella_no: umbrellaNo, status: 'rented' }
                        ]);
                        if (error) throw error;
                        alert(`✅ ${data.name} 학생, ${umbrellaNo}번 우산 대여가 완료되었습니다!`);
                        loadData(); // 표 새로고침
                    } else {
                        alert("대여가 취소되었습니다.");
                    }
                } 
                else if (data.type === 'return') {
                    // --- 반납 처리 ---
                    // DB에서 해당 학생이 빌려간 우산 번호를 찾음
                    const { data: rentalData, error: findError } = await supabase
                        .from('umbrella_rentals')
                        .select('umbrella_no')
                        .eq('student_id', data.studentId)
                        .eq('status', 'rented')
                        .single();

                    if (rentalData) {
                        if(confirm(`🔄 [반납 확인]\n\n이름: ${data.name}\n빌려간 우산: [ ${rentalData.umbrella_no} ]번\n\n정상적으로 반납 처리하시겠습니까?`)) {
                            const { error: updateError } = await supabase
                                .from('umbrella_rentals')
                                .update({ status: 'returned' })
                                .eq('student_id', data.studentId)
                                .eq('status', 'rented');
                            if (updateError) throw updateError;
                            alert('✅ 반납 처리가 완료되었습니다!');
                            loadData(); // 표 새로고침
                        }
                    } else {
                        alert(`⚠️ ${data.name}(${data.studentId}) 학생은 현재 대여 중인 우산 내역이 없습니다.`);
                    }
                }
            } catch (err) {
                alert("❌ 양심우산 대여 시스템용 QR코드가 아니거나 오류가 발생했습니다.");
            }
        }

        function onScanFailure(error) {
            // 스캔 중 화면에 QR이 없을 때 나는 에러는 무시
        }

        // 날짜/시간 예쁘게 포맷팅하는 함수
        function formatTime(dateStr) {
            const d = new Date(dateStr);
            return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        // 4. 현황판 불러오기
        async function loadData() {
            const { data, error } = await supabase
                .from('umbrella_rentals')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            const list = document.getElementById('reserve-list');
            list.innerHTML = '';
            
            data.forEach(row => {
                let statusBadge = row.status === 'rented' 
                    ? '<span class="badge bg-danger">대여 중</span>' 
                    : '<span class="badge bg-primary">반납 완료</span>';
                
                let rowHtml = `
                    <tr>
                        <td class="fw-bold">${row.student_id}</td>
                        <td>${row.name}</td>
                        <td class="fw-bold text-success">${row.umbrella_no}</td>
                        <td>${statusBadge}</td>
                        <td class="text-muted small">${formatTime(row.created_at)}</td>
                    </tr>
                `;
                list.innerHTML += rowHtml;
            });
        }

        // 페이지 켜지자마자 데이터 불러오기
        loadData();
    </script>
</body>
</html>
