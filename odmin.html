<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --bg-color: #F5F5F7; --card-bg: #FFFFFF; --text-main: #1D1D1F; 
            --text-sub: #86868B; --apple-blue: #0071E3; --border-color: #E5E5EA;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 28px; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        .header p { color: var(--text-sub); margin: 0; font-size: 15px; }
        
        .card { background-color: var(--card-bg); width: 100%; max-width: 500px; border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); margin-bottom: 20px; box-sizing: border-box; }
        
        #reader { border: none !important; border-radius: 16px; overflow: hidden; background: #000; width: 100%; }
        
        .manual-box { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 15px; outline: none; }
        input:focus { border-color: var(--apple-blue); }
        button { padding: 12px 20px; background-color: var(--apple-blue); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .table-header h3 { margin: 0; font-size: 18px; }
        .count-badge { background-color: #E8E8ED; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--text-sub); }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center;}
        th { padding: 10px 5px; color: var(--text-sub); font-weight: 500; border-bottom: 1px solid var(--border-color); }
        td { padding: 12px 5px; border-bottom: 1px solid var(--border-color); }
        
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .bg-rented { background-color: #FEECEB; color: #FF3B30; }

        #toast { visibility: hidden; min-width: 250px; background-color: rgba(29, 29, 31, 0.9); color: #fff; text-align: center; border-radius: 20px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 15px; font-weight: 500; backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>우산 관리 대시보드</h1>
        <p>QR 스캔으로 즉시 대여 및 반납</p>
    </div>

    <div class="card">
        <div id="reader"></div>
        <div class="manual-box">
            <input type="text" id="manualId" placeholder="학번 직접 입력">
            <button id="manualBtn">처리</button>
        </div>
    </div>

    <div class="card">
        <div class="table-header">
            <h3>현재 대여 명단</h3>
            <span class="count-badge" id="rentCount">0명 대여 중</span>
        </div>
        <table>
            <thead><tr><th>학번</th><th>우산</th><th>상태</th></tr></thead>
            <tbody id="rentalTableBody"></tbody>
        </table>
    </div>

    <div id="toast">알림 내용</div>

    <script>
        let supabase;
        try {
            const SUPABASE_URL = 'https://urzbonndueqylygtzlus.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_rZYklPBEFvoKZxatf_xAig_ceWd_epI';
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch(e) {
            alert("서버 연결에 실패했습니다. 페이지를 새로고침 해주세요.");
        }

        // 스캐너 초기화를 페이지가 완전히 로드된 후에 실행하도록 변경
        document.addEventListener("DOMContentLoaded", function() {
            const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 200, height: 200} }, false);
            html5QrcodeScanner.render((decodedText) => { 
                html5QrcodeScanner.pause(); 
                processStudent(decodedText, html5QrcodeScanner); 
            });

            document.getElementById('manualBtn').addEventListener('click', () => {
                const id = document.getElementById('manualId').value;
                if(id) processStudent(id, html5QrcodeScanner);
            });
        });

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message; toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        async function processStudent(studentId, scannerObj) {
            if(!supabase) return;
            try {
                const { data: existing, error: fetchErr } = await supabase.from('rentals').select('*').eq('studentId', studentId).eq('status', '대여중');
                if (fetchErr) throw fetchErr;

                if (existing && existing.length > 0) {
                    await supabase.from('rentals').update({ status: '반납완료', rentTime: new Date().toLocaleString() }).eq('id', existing[0].id);
                    showToast(`✅ [${studentId}] 반납 완료`);
                } else {
                    const umbrellaNum = prompt(`[${studentId}] 대여할 우산 번호를 입력하세요:`);
                    if(umbrellaNum) {
                        await supabase.from('rentals').insert([{ studentId: studentId, umbrellaNum: umbrellaNum, status: '대여중', rentTime: new Date().toLocaleString() }]);
                        showToast(`☂️ [${studentId}] 대여 완료`);
                    }
                }
            } catch (err) { 
                showToast("⚠️ 처리 중 오류 발생"); 
            }
            
            document.getElementById('manualId').value = '';
            fetchRentals();
            setTimeout(() => { if(scannerObj && scannerObj.getState() === 2) scannerObj.resume(); }, 1500);
        }

        async function fetchRentals() {
            if(!supabase) return;
            const { data, error } = await supabase.from('rentals').select('*').eq('status', '대여중').order('created_at', { ascending: false });
            if (error) return;

            const tbody = document.getElementById('rentalTableBody');
            document.getElementById('rentCount').innerText = `${data.length}명 대여 중`;
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="color:#86868B; padding: 30px 0;">빌려간 우산이 없습니다.</td></tr>`;
                return;
            }
            data.forEach((row) => {
                tbody.innerHTML += `<tr><td style="font-weight: 500;">${row.studentId}</td><td>${row.umbrellaNum}호</td><td><span class="badge bg-rented">대여 중</span></td></tr>`;
            });
        }
        
        // 초기 현황판 로드
        if(supabase) { fetchRentals(); }
    </script>
</body>
</html>
