<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 양심우산 대여현황</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 800px; margin: 0 auto; padding: 15px; }
        #reader { width: 100%; max-width: 500px; min-height: 250px; margin: 0 auto 15px auto; border: 2px dashed #ccc; background-color: #f9f9f9; display: flex; align-items: center; justify-content: center; color: #999; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 15px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #start-btn { background: #4CAF50; }
        #stop-btn { background: #f44336; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #333; color: white; }
        .refresh-btn { padding: 8px 12px; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; float: right; }
    </style>
</head>
<body>
    <h2>관리자 스캐너</h2>

    <div id="reader">카메라가 꺼져있습니다.</div>

    <div class="btn-group">
        <button id="start-btn" class="btn" onclick="startScanner()">📷 카메라 켜기</button>
        <button id="stop-btn" class="btn" onclick="stopScanner()">정지</button>
    </div>

    <h3>현재 대여 현황 <button class="refresh-btn" onclick="fetchRentals()">새로고침</button></h3>
    <table>
        <thead>
            <tr>
                <th>상태</th>
                <th>학번</th>
                <th>이름</th>
                <th>우산번호</th>
            </tr>
        </thead>
        <tbody id="rental-list"></tbody>
    </table>

    <script>
        // 이 부분은 반드시 한 번만 있어야 합니다!
        const supabaseUrl = 'https://urzbonndueqylygtzlus.supabase.co';
        const supabaseKey = 'sb_publishable_rZYklPBEFvoKZxatf_xAig_ceWd_epI';
        const supabase = supabaseCreateClient.createClient(supabaseUrl, supabaseKey);

        let html5QrCode;
        let isProcessing = false;

        function startScanner() {
            document.getElementById('reader').innerHTML = ""; 
            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess,
                (errorMessage) => { /* 무시 */ }
            ).then(() => {
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('stop-btn').style.display = 'block';
            }).catch((err) => {
                alert("카메라를 켤 수 없습니다.\n상세오류: " + err);
                document.getElementById('reader').innerHTML = "카메라 작동 실패";
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('start-btn').style.display = 'block';
                    document.getElementById('stop-btn').style.display = 'none';
                    document.getElementById('reader').innerHTML = "카메라가 꺼져있습니다.";
                }).catch(err => console.error(err));
            }
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;
            stopScanner(); 

            try {
                const data = JSON.parse(decodedText);
                
                if (data.action === 'rent') {
                    const umbrellaNum = prompt(`${data.student_name} 학생에게 빌려줄 우산 번호를 입력하세요:`);
                    if (umbrellaNum) {
                        const { error } = await supabase.from('umbrella_rentals').insert([
                            { student_id: data.student_id, student_name: data.student_name, phone_number: data.phone_number, umbrella_number: umbrellaNum, status: '대여중' }
                        ]);
                        if (error) throw error;
                        alert('✅ 대여 완료되었습니다!');
                    }
                } else if (data.action === 'return') {
                    const { error } = await supabase.from('umbrella_rentals')
                        .update({ status: '반납완료', return_date: new Date().toISOString() })
                        .eq('student_id', data.student_id)
                        .eq('status', '대여중');
                    
                    if (error) throw error;
                    alert(`✅ ${data.student_name} 학생의 우산이 반납 완료되었습니다!`);
                }
            } catch (err) {
                console.error(err);
                alert('QR 코드 인식 오류 또는 DB 에러가 발생했습니다.');
            } finally {
                fetchRentals();
                setTimeout(() => { isProcessing = false; }, 2000);
            }
        }

        async function fetchRentals() {
            const { data, error } = await supabase.from('umbrella_rentals').select('*').order('rent_date', { ascending: false }).limit(20);
            if (error) return console.error(error);

            const tbody = document.getElementById('rental-list');
            tbody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong style="color: ${row.status === '대여중' ? '#f44336' : '#4CAF50'}">${row.status}</strong></td>
                    <td>${row.student_id}</td>
                    <td>${row.student_name}</td>
                    <td>${row.umbrella_number || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        fetchRentals();
    </script>
</body>
</html>
