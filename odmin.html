<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 양심우산 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* 상단 헤더 영역 */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 25px; }
        .header h2 { margin: 0; font-weight: 800; color: #2c3e50; }
        .action-buttons { display: flex; gap: 10px; }
        
        /* 버튼 디자인 */
        .btn { padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-refresh { background-color: #f1f5f9; color: #475569; }
        .btn-refresh:hover { background-color: #e2e8f0; }
        .btn-danger { background-color: #fee2e2; color: #ef4444; border: 1px solid #fca5a5; }
        .btn-danger:hover { background-color: #fca5a5; color: white; }
        
        /* 스캐너 영역 */
        #reader { width: 100%; max-width: 450px; margin: 0 auto 30px auto; border: 3px dashed #cbd5e1 !important; border-radius: 16px; overflow: hidden; }
        
        /* 데이터 테이블 디자인 */
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; text-align: center; white-space: nowrap; }
        th { background-color: #f8fafc; color: #475569; font-weight: 700; padding: 15px; font-size: 14px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; font-size: 15px; border-bottom: 1px solid #f1f5f9; color: #334155; }
        tr:hover { background-color: #f8fafc; }
        
        /* 상태 뱃지 */
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; display: inline-block; }
        .badge-rent { background: #fee2e2; color: #ef4444; }
        .badge-return { background: #dcfce7; color: #16a34a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>☂️ 관리자 대시보드</h2>
            <div class="action-buttons">
                <button class="btn btn-refresh" onclick="fetchRentals()">🔄 새로고침</button>
                <button class="btn btn-danger" onclick="resetList()">🗑️ 명단 초기화</button>
            </div>
        </div>

        <div id="reader"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>상태</th>
                        <th>학번</th>
                        <th>이름</th>
                        <th>우산번호</th>
                        <th>대여/반납 일시</th>
                    </tr>
                </thead>
                <tbody id="rental-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const myDb = supabase.createClient('https://urzbonndueqylygtzlus.supabase.co', 'sb_publishable_rZYklPBEFvoKZxatf_xAig_ceWd_epI');
        let isProcessing = false;

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
        html5QrcodeScanner.render(onScanSuccess);

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                const data = JSON.parse(decodedText);
                
                if (data.action === 'rent') {
                    const umbrellaNum = prompt(`[대여] ${data.student_name} 학생에게 빌려줄 우산 번호:`);
                    if (umbrellaNum) {
                        const { error } = await myDb.from('umbrella_rentals').insert([
                            { student_id: data.student_id, student_name: data.student_name, phone_number: data.phone_number, umbrella_number: umbrellaNum, status: '대여중' }
                        ]);
                        if (error) throw error;
                        alert('✅ 대여 처리되었습니다.');
                    }
                } else if (data.action === 'return') {
                    const { error } = await myDb.from('umbrella_rentals')
                        .update({ status: '반납완료', return_date: new Date().toISOString() })
                        .eq('student_id', data.student_id)
                        .eq('status', '대여중');
                    
                    if (error) throw error;
                    alert(`✅ ${data.student_name} 학생 반납 처리 완료!`);
                }
            } catch (err) {
                console.error(err);
                alert('유효하지 않은 QR이거나 DB 오류입니다.');
            } finally {
                fetchRentals();
                setTimeout(() => { isProcessing = false; }, 2000);
            }
        }

        async function fetchRentals() {
            const { data, error } = await myDb.from('umbrella_rentals').select('*').order('rent_date', { ascending: false }).limit(30);
            if (error) return console.error(error);

            const tbody = document.getElementById('rental-list');
            tbody.innerHTML = '';
            
            data.forEach(row => {
                const isRent = row.status === '대여중';
                const badgeClass = isRent ? 'badge-rent' : 'badge-return';
                // 대여중이면 대여시간을, 반납완료면 반납시간을 표시
                const timeStr = new Date(isRent ? row.rent_date : row.return_date).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="badge ${badgeClass}">${row.status}</span></td>
                    <td style="font-weight: bold;">${row.student_id}</td>
                    <td>${row.student_name}</td>
                    <td><strong style="color: #2563eb;">${row.umbrella_number || '-'}</strong></td>
                    <td style="color: #64748b; font-size: 13px;">${timeStr}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 🚨 명단 초기화 (안전장치 포함)
        async function resetList() {
            if(confirm("⚠️ 정말 모든 대여/반납 기록을 영구적으로 삭제하시겠습니까?\n이 작업은 절대 되돌릴 수 없습니다.")) {
                const confirmWord = prompt("초기화를 진행하려면 입력창에 '초기화' 라고 똑같이 입력해주세요.");
                if(confirmWord === '초기화') {
                    // id가 0이 아닌 모든 데이터를 삭제 (전체 삭제)
                    const { error } = await myDb.from('umbrella_rentals').delete().neq('id', 0);
                    if(!error) {
                        alert("✅ 모든 명단이 깔끔하게 초기화되었습니다.");
                        fetchRentals(); // 테이블 다시 불러오기 (빈 화면)
                    } else {
                        alert("삭제 중 오류가 발생했습니다: " + error.message);
                    }
                } else {
                    alert("입력한 단어가 틀려 초기화가 취소되었습니다.");
                }
            }
        }

        fetchRentals();
    </script>
</body>
</html>
