<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우산 대여 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-red-600">🛡️ 관리자: QR 스캐너 및 현황</h1>
        
        <div id="reader" class="mb-6 w-full max-w-md mx-auto"></div>

        <h2 class="text-xl font-bold mb-3 border-b pb-2">대여/반납 현황</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-2 border">학번</th>
                        <th class="p-2 border">이름</th>
                        <th class="p-2 border">우산번호</th>
                        <th class="p-2 border">상태</th>
                    </tr>
                </thead>
                <tbody id="statusTable">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Supabase 설정 (알려주신 키 적용)
        const SUPABASE_URL = 'https://urzbonndueqylygtzlus.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_rZYklPBEFvoKZxatf_xAig_ceWd_epI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);

        // QR 스캔 성공 시 실행되는 함수
        async function onScanSuccess(decodedText, decodedResult) {
            html5QrcodeScanner.pause(); // 연속 스캔 방지

            try {
                const data = JSON.parse(decodedText);
                
                if (data.type === 'rent') {
                    let umbrellaNo = prompt(`[대여] ${data.name}(${data.studentId}) 학생입니다.\n지급할 우산 번호를 입력하세요:`);
                    if (umbrellaNo) {
                        const { error } = await supabase.from('umbrella_rentals').insert([
                            { student_id: data.studentId, name: data.name, phone: data.phone, umbrella_no: umbrellaNo, status: 'rented' }
                        ]);
                        if (error) throw error;
                        alert('대여 처리가 완료되었습니다!');
                    }
                } 
                else if (data.type === 'return') {
                    if(confirm(`[반납] ${data.name}(${data.studentId}) 학생의 우산을 반납 처리하시겠습니까?`)) {
                        const { error } = await supabase
                            .from('umbrella_rentals')
                            .update({ status: 'returned' })
                            .eq('student_id', data.studentId)
                            .eq('status', 'rented');
                        if (error) throw error;
                        alert('반납 처리가 완료되었습니다!');
                    }
                }
            } catch (err) {
                console.error(err);
                alert('오류가 발생했거나 잘못된 QR코드입니다.');
            }
            
            fetchStatus(); // 현황 업데이트
            setTimeout(() => html5QrcodeScanner.resume(), 2000); // 2초 후 스캐너 재개
        }

        html5QrcodeScanner.render(onScanSuccess, (error) => { /* 스캔 중 에러 무시 */ });

        // 현황 불러오기
        async function fetchStatus() {
            const { data, error } = await supabase
                .from('umbrella_rentals')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('현황 불러오기 실패:', error);
                return;
            }

            const tbody = document.getElementById('statusTable');
            tbody.innerHTML = '';
            
            data.forEach(row => {
                let statusText = row.status === 'rented' ? '<span class="text-red-500 font-bold">대여중</span>' : '<span class="text-green-500 font-bold">반납완료</span>';
                tbody.innerHTML += `
                    <tr>
                        <td class="p-2 border">${row.student_id}</td>
                        <td class="p-2 border">${row.name}</td>
                        <td class="p-2 border">${row.umbrella_no}</td>
                        <td class="p-2 border">${statusText}</td>
                    </tr>
                `;
            });
        }

        // 페이지 로드 시 현황 불러오기
        fetchStatus();
    </script>
</body>
</html>
